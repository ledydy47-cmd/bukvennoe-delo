<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Оплата прошла — Буквенное дело</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #f5f0e8;
  font-family: 'Georgia', serif;
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
}
.wrap { max-width: 400px; width: 100%; text-align: center; }
.brand {
  font-size: 20px; font-weight: bold; letter-spacing: 5px;
  color: #2c1a0e; border: 3px solid #2c1a0e;
  display: inline-block; padding: 4px 14px; margin-bottom: 24px;
}
.icon { font-size: 64px; margin-bottom: 16px; }
.title { font-size: 24px; font-weight: bold; color: #2c1a0e; margin-bottom: 12px; }
.sub { font-size: 14px; color: #6b4c2a; line-height: 1.6; margin-bottom: 32px; }
.btn {
  width: 100%; padding: 16px; background: #2c1a0e; color: #f5f0e8;
  border: none; border-radius: 30px; font-family: 'Georgia', serif;
  font-size: 15px; font-weight: bold; letter-spacing: 1px;
  cursor: pointer; transition: background .2s;
}
.btn:hover { background: #4a2c14; }
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">БУКВЕННОЕ ДЕЛО</div>
  <div class="icon">🎉</div>
  <div class="title">Оплата прошла!</div>
  <div class="sub" id="subText">Все дела теперь открыты. Приятной игры!</div>
  <button class="btn" onclick="goPlay()">🔍 Играть</button>
</div>
<script>
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }

const params = new URLSearchParams(window.location.search);
const plan = params.get('plan');

if (plan === 'lifetime') {
  document.getElementById('subText').textContent = '♾️ Вечный доступ активирован! Все 50+ дел открыты навсегда.';
} else if (plan === 'monthly') {
  document.getElementById('subText').textContent = '✅ Подписка на месяц активирована! Все дела открыты.';
}

function goPlay() {
  window.location.href = 'index.html';
}
</script>
</body>
</html>
