<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Буквенное дело</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #f5f0e8;
  font-family: 'Georgia', serif;
  min-height: 100vh;
  padding: 20px 16px 40px;
}
.header { text-align: center; margin-bottom: 24px; padding-top: 10px; }
.brand {
  font-size: 22px; font-weight: bold; letter-spacing: 6px;
  color: #2c1a0e; border: 3px solid #2c1a0e;
  display: inline-block; padding: 6px 18px; margin-bottom: 6px;
}
.subtitle { font-size: 12px; letter-spacing: 2px; color: #6b4c2a; text-transform: uppercase; }
hr { border: none; border-top: 2px solid #2c1a0e; margin: 0 0 20px; }

.unlock-banner {
  text-align: center;
  margin-bottom: 24px;
  padding: 20px 16px;
  background: #fdf6ec;
  border: 2px solid #2c1a0e;
  border-radius: 10px;
}
.unlock-title {
  font-size: 20px;
  font-weight: bold;
  letter-spacing: 3px;
  color: #2c1a0e;
  text-transform: uppercase;
  margin-bottom: 8px;
}
.unlock-sub {
  font-size: 13px;
  color: #6b4c2a;
  line-height: 1.5;
}
.unlock-btn {
  display: inline-block;
  margin-top: 14px;
  padding: 12px 28px;
  background: #2c1a0e;
  color: #f5f0e8;
  border: none;
  border-radius: 30px;
  font-family: 'Georgia', serif;
  font-size: 14px;
  font-weight: bold;
  letter-spacing: 1px;
  cursor: pointer;
  transition: background .2s;
}
.unlock-btn:hover { background: #4a2c14; }

.cases-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }

.case-card {
  background: #fdf6ec; border: 2px solid #2c1a0e;
  border-radius: 8px; padding: 14px 16px;
  cursor: pointer; transition: all 0.2s;
  display: flex; align-items: center; gap: 12px;
}
.case-card:hover { background: #f0e4cc; }
.case-card.locked { opacity: 0.75; }
.case-card.completed { border-color: #27ae60; }

.case-num { font-size: 11px; letter-spacing: 1px; text-transform: uppercase; color: #6b4c2a; margin-bottom: 2px; }
.case-title { font-size: 16px; font-weight: bold; color: #2c1a0e; }
.case-meta { font-size: 11px; color: #888; margin-top: 4px; }
.case-icon { font-size: 28px; flex-shrink: 0; }
.case-info { flex: 1; }

.badge {
  font-size: 11px; font-weight: bold; padding: 3px 8px;
  border-radius: 20px; flex-shrink: 0; white-space: nowrap;
}
.badge.done     { background: #c8e6c9; color: #1b5e20; }
.badge.progress { background: #fff9c4; color: #f57f17; }

.sub-active {
  background: #c8e6c9; border: 2px solid #27ae60;
  border-radius: 8px; padding: 10px 14px; margin-bottom: 16px;
  font-size: 13px; color: #1b5e20; text-align: center;
}

.footer-links {
  text-align: center; font-size: 11px; color: #999; margin-top: 10px;
}
.footer-links a { color: #6b4c2a; margin: 0 6px; }

.loading { text-align: center; padding: 40px; font-size: 14px; color: #6b4c2a; }
</style>
</head>
<body>
<div class="header">
  <div class="brand">БУКВЕННОЕ ДЕЛО</div>
  <div class="subtitle">Детективные головоломки</div>
</div>
<hr>

<div id="subStatus"></div>
<div id="unlockBanner" style="display:none;">
  <div class="unlock-banner">
    <div class="unlock-title">ОТКРОЙ ВСЕ ДЕЛА</div>
    <div class="unlock-sub">50+ дел сейчас + 30 новых дел каждую неделю</div>
    <button class="unlock-btn" onclick="goSubscribe()">🔓 Открыть доступ</button>
  </div>
  <br>
</div>

<div id="app"><div class="loading">🔍 Загружаем дела...</div></div>

<div class="footer-links">
  <a href="privacy.html">Конфиденциальность</a>
  <a href="terms.html">Соглашение</a>
  <a href="subscribe.html">Подписка</a>
</div>

<script type="module">
const BASE_URL = 'https://inspiring-friendship-production-bf42.up.railway.app';
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }

const headers = () => ({
  'Content-Type': 'application/json',
  'X-Init-Data': tg?.initData ?? '',
});

async function trackEvent(event, meta = {}) {
  try {
    await fetch(`${BASE_URL}/api/analytics/event`, {
      method: 'POST', headers: headers(),
      body: JSON.stringify({ event, meta }),
    });
  } catch {}
}

async function loadCases() {
  try {
    const res = await fetch(`${BASE_URL}/api/cases`, { headers: headers() });
    return await res.json();
  } catch { return []; }
}

async function checkSubStatus() {
  try {
    const res = await fetch(`${BASE_URL}/api/payment/status`, { headers: headers() });
    const data = await res.json();
    const box = document.getElementById('subStatus');
    if (data.subscription_type === 'lifetime') {
      box.innerHTML = '<div class="sub-active">♾️ У вас вечный доступ — все дела открыты!</div>';
    } else if (data.subscription_type === 'monthly' && data.subscription_expires_at) {
      const exp = new Date(data.subscription_expires_at).toLocaleDateString('ru-RU');
      box.innerHTML = `<div class="sub-active">✅ Подписка активна до ${exp}</div>`;
    }
  } catch {}
}

function getIcon(progress, access) {
  if (access === 'locked') return '🔒';
  if (progress === 'completed') return '✅';
  if (progress === 'in_progress') return '🔍';
  return '📋';
}

function getBadge(progress) {
  if (progress === 'completed') return '<span class="badge done">✅ Раскрыто</span>';
  if (progress === 'in_progress') return '<span class="badge progress">🔍 В процессе</span>';
  return '';
}

function renderCases(cases) {
  const app = document.getElementById('app');
  if (!cases.length) {
    app.innerHTML = '<div class="loading">Дела не найдены</div>';
    return;
  }

  const hasLocked = cases.some(c => c.access === 'locked');
  const hasCompleted = cases.some(c => c.progress === 'completed');

  // Показываем баннер только если есть закрытые дела И есть хотя бы одно завершённое
  if (hasLocked && hasCompleted) {
    document.getElementById('unlockBanner').style.display = 'block';
  }

  const list = cases.map(c => `
    <div class="case-card ${c.access === 'locked' ? 'locked' : ''} ${c.progress === 'completed' ? 'completed' : ''}"
         onclick="openCase(${c.id}, '${c.access}')">
      <div class="case-icon">${getIcon(c.progress, c.access)}</div>
      <div class="case-info">
        <div class="case-num">Дело № ${c.case_number}</div>
        <div class="case-title">${c.title}</div>
        <div class="case-meta">
          ${c.progress === 'in_progress' ? `Найдено слов: ${c.found_words?.length ?? 0}` : ''}
          ${c.progress === 'completed' ? 'Дело раскрыто' : ''}
        </div>
      </div>
      ${getBadge(c.progress)}
    </div>
  `).join('');

  app.innerHTML = `<div class="cases-list">${list}</div>`;
}

window.openCase = function(id, access) {
  if (access === 'locked') {
    trackEvent('paywall_shown');
    goSubscribe();
    return;
  }
  trackEvent('game_start', { case_id: id });
  window.location.href = `game.html?id=${id}`;
};

window.goSubscribe = function() {
  window.location.href = 'subscribe.html';
};

trackEvent('app_open');
await checkSubStatus();
const cases = await loadCases();
renderCases(cases);
</script>
</body>
</html>
