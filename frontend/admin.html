<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Админка — Буквенное дело</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #f5f0e8;
  font-family: 'Georgia', serif;
  min-height: 100vh;
  padding: 20px 16px 40px;
  color: #2c1a0e;
}
.header { text-align: center; margin-bottom: 24px; padding-top: 10px; }
.brand {
  font-size: 22px; font-weight: bold; letter-spacing: 6px;
  color: #2c1a0e; border: 3px solid #2c1a0e;
  display: inline-block; padding: 6px 18px; margin-bottom: 6px;
}
.subtitle { font-size: 12px; letter-spacing: 2px; color: #6b4c2a; text-transform: uppercase; }
hr { border: none; border-top: 2px solid #2c1a0e; margin: 0 0 20px; }

.tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
.tab {
  padding: 10px 20px; border-radius: 30px; cursor: pointer;
  border: 2px solid #2c1a0e; background: transparent;
  color: #2c1a0e; font-family: 'Georgia', serif;
  font-size: 13px; font-weight: bold; letter-spacing: 1px;
  transition: 0.2s;
}
.tab.active { background: #2c1a0e; color: #f5f0e8; }
.tab:hover:not(.active) { background: #f0e4cc; }
.tab-content { display: none; }
.tab-content.active { display: block; }

.card {
  background: #fdf6ec; border: 2px solid #2c1a0e;
  border-radius: 10px; padding: 20px; margin-bottom: 20px;
}
.card h2 {
  font-size: 16px; letter-spacing: 2px; text-transform: uppercase;
  color: #2c1a0e; margin-bottom: 16px; padding-bottom: 10px;
  border-bottom: 1px solid #c8a880;
}

/* Stats */
.stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; margin-bottom: 20px; }
.stat-box {
  background: #fdf6ec; border: 2px solid #2c1a0e;
  border-radius: 8px; padding: 16px; text-align: center;
}
.stat-num { font-size: 28px; font-weight: bold; color: #2c1a0e; }
.stat-label { font-size: 11px; color: #6b4c2a; margin-top: 4px; letter-spacing: 1px; text-transform: uppercase; }

/* Funnel */
.funnel { display: flex; flex-direction: column; gap: 8px; }
.funnel-row { display: flex; align-items: center; gap: 12px; }
.funnel-label { width: 160px; font-size: 12px; color: #6b4c2a; text-align: right; flex-shrink: 0; }
.funnel-bar-wrap { flex: 1; background: #f0e4cc; border-radius: 4px; height: 28px; overflow: hidden; border: 1px solid #c8a880; }
.funnel-bar {
  height: 100%; background: #2c1a0e;
  border-radius: 4px; display: flex; align-items: center;
  padding-left: 10px; font-size: 13px; font-weight: bold;
  color: #f5f0e8; min-width: 40px; transition: width 0.5s;
}

/* Table */
table.data { width: 100%; border-collapse: collapse; font-size: 13px; }
table.data th { color: #6b4c2a; border-bottom: 2px solid #c8a880; padding: 8px 12px; text-align: left; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; }
table.data td { padding: 8px 12px; border-bottom: 1px solid #f0e4cc; }
table.data tr:hover td { background: #f0e4cc; }

/* Cases */
.cases-list { display: flex; flex-direction: column; gap: 8px; }
.case-item {
  background: #f5f0e8; border: 2px solid #c8a880;
  border-radius: 8px; padding: 14px 16px;
  display: flex; justify-content: space-between; align-items: center;
  transition: 0.2s;
}
.case-item:hover { border-color: #2c1a0e; background: #f0e4cc; }
.case-title { font-weight: bold; color: #2c1a0e; font-size: 15px; }
.case-meta { color: #6b4c2a; font-size: 12px; margin-top: 3px; }

/* Users */
.user-item {
  background: #f5f0e8; border: 2px solid #c8a880;
  border-radius: 8px; padding: 12px 16px; margin-bottom: 8px;
  display: flex; justify-content: space-between; align-items: center;
}
.user-item:hover { border-color: #2c1a0e; }
.user-name { font-weight: bold; color: #2c1a0e; font-size: 14px; }
.user-meta { font-size: 11px; color: #6b4c2a; margin-top: 2px; }
.user-badge {
  font-size: 11px; font-weight: bold; padding: 4px 10px;
  border-radius: 20px; white-space: nowrap;
}
.badge-free { background: #f0e4cc; color: #6b4c2a; border: 1px solid #c8a880; }
.badge-monthly { background: #c8e6c9; color: #1b5e20; border: 1px solid #27ae60; }
.badge-lifetime { background: #2c1a0e; color: #f5f0e8; }

.btn {
  background: #2c1a0e; color: #f5f0e8;
  border: none; border-radius: 30px;
  padding: 10px 20px; font-family: 'Georgia', serif;
  font-size: 13px; font-weight: bold; letter-spacing: 1px;
  cursor: pointer; transition: 0.2s;
}
.btn:hover { background: #4a2c14; }
.btn-sm { padding: 7px 14px; font-size: 12px; }
.btn-outline {
  background: transparent; border: 2px solid #2c1a0e;
  color: #2c1a0e;
}
.btn-outline:hover { background: #f0e4cc; }

/* Grid */
.grid-wrap { overflow-x: auto; margin: 16px 0; }
table.grid { border-collapse: collapse; margin: 0 auto; }
table.grid td {
  width: 40px; height: 40px; text-align: center;
  vertical-align: middle; border: 1px solid #c8a880;
  font-size: 15px; font-weight: bold; color: #2c1a0e;
}
table.grid td.found { background: #c8e6c9; border-color: #27ae60; }
table.grid td.secret { background: #2c1a0e; color: #f5f0e8; }

.words-list { display: flex; flex-wrap: wrap; gap: 8px; margin: 12px 0; }
.word-tag {
  padding: 6px 14px; border-radius: 20px; font-size: 13px;
  border: 2px solid #c8a880; background: #f5f0e8; color: #2c1a0e;
}
.word-tag.in-grid { background: #c8e6c9; border-color: #27ae60; color: #1b5e20; }
.word-tag.absent { background: #ffcdd2; border-color: #e57373; color: #b71c1c; text-decoration: line-through; }

.answer-box {
  background: #2c1a0e; border-radius: 8px;
  padding: 16px; margin-top: 12px;
  display: flex; gap: 24px; flex-wrap: wrap;
}
.answer-item { font-size: 15px; color: #f5f0e8; }
.answer-item span { color: #c8a880; font-size: 11px; display: block; margin-bottom: 2px; letter-spacing: 1px; text-transform: uppercase; }

.legend { display: flex; gap: 16px; font-size: 12px; color: #6b4c2a; margin-bottom: 8px; flex-wrap: wrap; }
.legend-dot { width: 14px; height: 14px; border-radius: 3px; display: inline-block; margin-right: 4px; vertical-align: middle; }

.row { display: flex; gap: 12px; align-items: flex-end; margin-bottom: 16px; flex-wrap: wrap; }
label { display: block; color: #6b4c2a; font-size: 12px; margin-bottom: 5px; letter-spacing: 1px; text-transform: uppercase; }
input, select {
  background: #f5f0e8; border: 2px solid #c8a880;
  color: #2c1a0e; border-radius: 8px;
  padding: 9px 13px; font-size: 14px; font-family: 'Georgia', serif;
}
input:focus, select:focus { outline: none; border-color: #2c1a0e; }

.empty { color: #6b4c2a; text-align: center; padding: 24px; font-size: 14px; }
.error { color: #b71c1c; text-align: center; padding: 24px; font-size: 14px; }

.my-access-banner {
  background: #2c1a0e; color: #f5f0e8;
  border-radius: 8px; padding: 12px 16px;
  margin-bottom: 16px; font-size: 13px;
  display: flex; align-items: center; justify-content: space-between;
}
</style>
</head>
<body>
<div class="header">
  <div class="brand">БУКВЕННОЕ ДЕЛО</div>
  <div class="subtitle">Панель управления</div>
</div>
<hr>

<div class="tabs">
  <button class="tab active" onclick="showTab('stats', this)">📊 Статистика</button>
  <button class="tab" onclick="showTab('users', this)">👥 Пользователи</button>
  <button class="tab" onclick="showTab('cases', this)">📋 Дела</button>
  <button class="tab" onclick="showTab('preview', this)">👁 Решение дела</button>
</div>

<!-- СТАТИСТИКА -->
<div id="tab-stats" class="tab-content active">
  <div id="statsContent"><p class="empty">Загружаю...</p></div>
</div>

<!-- ПОЛЬЗОВАТЕЛИ -->
<div id="tab-users" class="tab-content">
  <div class="card">
    <h2>👥 Пользователи</h2>
    <div style="display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;">
      <button class="btn btn-sm" onclick="loadUsers('all')">Все</button>
      <button class="btn btn-sm btn-outline" onclick="loadUsers('monthly')">💳 Месяц</button>
      <button class="btn btn-sm btn-outline" onclick="loadUsers('lifetime')">♾️ Навсегда</button>
      <button class="btn btn-sm btn-outline" onclick="loadUsers('free')">🆓 Бесплатные</button>
    </div>
    <div id="usersList"><p class="empty">Нажми кнопку для загрузки</p></div>
  </div>
</div>

<!-- ДЕЛА -->
<div id="tab-cases" class="tab-content">
  <div class="card">
    <h2>📋 Все дела</h2>
    <button class="btn btn-sm" onclick="loadCases()" style="margin-bottom:16px">🔄 Обновить</button>
    <div id="casesList"><p class="empty">Нажми "Обновить"</p></div>
  </div>
</div>

<!-- РЕШЕНИЕ ДЕЛА -->
<div id="tab-preview" class="tab-content">
  <div class="card">
    <h2>👁 Просмотр решения</h2>
    <div class="row">
      <div>
        <label>Номер дела</label>
        <input type="number" id="previewNum" placeholder="1" style="width:100px" onkeydown="if(event.key==='Enter')loadPreview()">
      </div>
      <button class="btn btn-sm" onclick="loadPreview()">Загрузить</button>
    </div>
    <div id="previewContainer"><p class="empty">Введи номер дела и нажми "Загрузить"</p></div>
  </div>
</div>

<script>
const API = 'https://inspiring-friendship-production-bf42.up.railway.app';
const ADMIN_KEY = 'bukvendelo_admin_2024';

function showTab(name, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  el.classList.add('active');
  if (name === 'stats') loadStats();
  if (name === 'cases') loadCases();
  if (name === 'users') loadUsers('all');
}

// ===== СТАТИСТИКА =====
async function loadStats() {
  document.getElementById('statsContent').innerHTML = '<p class="empty">Загружаю...</p>';
  try {
    const res = await fetch(`${API}/api/analytics/dashboard`, { headers: { 'x-admin-key': ADMIN_KEY } });
    const d = await res.json();
    const t = d.totals;
    const f = d.funnel;
    const maxFunnel = Math.max(f.bot_start, 1);

    const funnelItems = [
      { label: '🤖 Запуск бота', val: f.bot_start },
      { label: '📱 Открыли игру', val: f.app_open },
      { label: '🎮 Начали дело', val: f.game_start },
      { label: '✅ Завершили', val: f.game_complete },
      { label: '💳 Видели paywall', val: f.paywall_shown },
      { label: '🔓 Подписались', val: f.subscribed },
    ];

    document.getElementById('statsContent').innerHTML = `
      <div class="stats-grid">
        <div class="stat-box"><div class="stat-num">${t.total_users}</div><div class="stat-label">Всего пользователей</div></div>
        <div class="stat-box"><div class="stat-num">${t.new_users_7d}</div><div class="stat-label">Новых за 7 дней</div></div>
        <div class="stat-box"><div class="stat-num">${t.new_users_30d}</div><div class="stat-label">Новых за 30 дней</div></div>
        <div class="stat-box"><div class="stat-num">${t.dau}</div><div class="stat-label">DAU сегодня</div></div>
        <div class="stat-box"><div class="stat-num">${t.wau}</div><div class="stat-label">WAU неделя</div></div>
        <div class="stat-box"><div class="stat-num">${t.total_completions}</div><div class="stat-label">Дел завершено</div></div>
        <div class="stat-box"><div class="stat-num">${t.monthly_subs}</div><div class="stat-label">Подписок месяц</div></div>
        <div class="stat-box"><div class="stat-num">${t.lifetime_subs}</div><div class="stat-label">Подписок навсегда</div></div>
      </div>

      <div class="card">
        <h2>🔽 Воронка</h2>
        <div class="funnel">
          ${funnelItems.map(item => `
            <div class="funnel-row">
              <div class="funnel-label">${item.label}</div>
              <div class="funnel-bar-wrap">
                <div class="funnel-bar" style="width:${Math.max(3, Math.round(item.val/maxFunnel*100))}%">${item.val}</div>
              </div>
            </div>
          `).join('')}
        </div>
      </div>

      <div class="card">
        <h2>🏆 Топ дел</h2>
        <table class="data">
          <thead><tr><th>№</th><th>Название</th><th>Начали</th><th>Завершили</th><th>Среднее время</th></tr></thead>
          <tbody>
            ${d.topCases.map(c => `
              <tr>
                <td>${c.case_number}</td>
                <td>${c.title}</td>
                <td>${c.started}</td>
                <td>${c.completed}</td>
                <td>${c.avg_minutes ? c.avg_minutes + ' мин' : '—'}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>

      <div class="card">
        <h2>📅 События за 30 дней</h2>
        <table class="data">
          <thead><tr><th>Дата</th><th>Событие</th><th>Всего</th><th>Уникальных</th></tr></thead>
          <tbody>
            ${d.byDay.slice(0, 50).map(r => `
              <tr>
                <td>${r.date}</td>
                <td>${r.event}</td>
                <td>${r.count}</td>
                <td>${r.unique_users}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    `;
  } catch(e) {
    document.getElementById('statsContent').innerHTML = `<p class="error">Ошибка: ${e.message}</p>`;
  }
}

// ===== ПОЛЬЗОВАТЕЛИ =====
async function loadUsers(filter = 'all') {
  document.getElementById('usersList').innerHTML = '<p class="empty">Загружаю...</p>';
  try {
    const res = await fetch(`${API}/api/analytics/users?filter=${filter}`, {
      headers: { 'x-admin-key': ADMIN_KEY }
    });

    if (!res.ok) {
      // Если эндпоинта нет — показываем заглушку с данными из dashboard
      const res2 = await fetch(`${API}/api/analytics/dashboard`, { headers: { 'x-admin-key': ADMIN_KEY } });
      const d = await res2.json();
      document.getElementById('usersList').innerHTML = `
        <div class="my-access-banner">
          <span>⚠️ Эндпоинт /api/analytics/users не найден. Нужно добавить в бэкенд.</span>
        </div>
        <div class="stats-grid">
          <div class="stat-box"><div class="stat-num">${d.totals.total_users}</div><div class="stat-label">Всего пользователей</div></div>
          <div class="stat-box"><div class="stat-num">${d.totals.monthly_subs}</div><div class="stat-label">Подписок (месяц)</div></div>
          <div class="stat-box"><div class="stat-num">${d.totals.lifetime_subs}</div><div class="stat-label">Подписок (навсегда)</div></div>
        </div>
      `;
      return;
    }

    const users = await res.json();
    if (!users.length) {
      document.getElementById('usersList').innerHTML = '<p class="empty">Пользователей нет</p>';
      return;
    }

    document.getElementById('usersList').innerHTML = users.map(u => {
      const subLabel = u.subscription_type === 'lifetime' ? '♾️ Навсегда'
        : u.subscription_type === 'monthly' ? '💳 Месяц'
        : '🆓 Бесплатно';
      const subClass = u.subscription_type === 'lifetime' ? 'badge-lifetime'
        : u.subscription_type === 'monthly' ? 'badge-monthly'
        : 'badge-free';
      const name = u.first_name
        ? `${u.first_name}${u.username ? ' (@' + u.username + ')' : ''}`
        : `ID: ${u.telegram_id}`;
      const date = new Date(u.created_at).toLocaleDateString('ru-RU');
      const lastSeen = u.last_seen_at ? new Date(u.last_seen_at).toLocaleDateString('ru-RU') : '—';
      const appOpened = u.app_open_count > 0 ? `✅ ${u.app_open_count} раз` : '❌ не открывал';
      return `
        <div class="user-item">
          <div style="flex:1">
            <div class="user-name">${name}</div>
            <div class="user-meta">
              📅 Регистрация: ${date} &nbsp;|&nbsp; 👁 Последний визит: ${lastSeen}
            </div>
            <div class="user-meta" style="margin-top:4px">
              📱 Открыл приложение: ${appOpened} &nbsp;|&nbsp;
              🎮 Начато дел: ${u.total_cases_started || 0} &nbsp;|&nbsp;
              🏆 Завершено: ${u.completed_cases || 0}
            </div>
          </div>
          <span class="user-badge ${subClass}">${subLabel}</span>
        </div>
      `;
    }).join('');

  } catch(e) {
    document.getElementById('usersList').innerHTML = `<p class="error">Ошибка: ${e.message}</p>`;
  }
}

// ===== ДЕЛА =====
async function loadCases() {
  document.getElementById('casesList').innerHTML = '<p class="empty">Загружаю...</p>';
  try {
    const res = await fetch(`${API}/api/analytics/dashboard`, { headers: { 'x-admin-key': ADMIN_KEY } });
    const d = await res.json();
    const statsMap = {};
    for (const c of d.topCases) statsMap[c.case_number] = c;

    const res2 = await fetch(`${API}/api/cases/admin/list`, { headers: { 'x-admin-key': ADMIN_KEY } });
    if (!res2.ok) {
      document.getElementById('casesList').innerHTML = `<p class="error">Нет доступа к /api/cases/admin/list</p>`;
      return;
    }

    const cases = await res2.json();
    if (!cases.length) { document.getElementById('casesList').innerHTML = '<p class="empty">Дел нет</p>'; return; }

    document.getElementById('casesList').innerHTML = `
      <div class="cases-list">
        ${cases.map(c => {
          const s = statsMap[c.case_number] || {};
          return `
          <div class="case-item">
            <div>
              <div class="case-title">№${c.case_number} — ${c.title}</div>
              <div class="case-meta">
                ${c.difficulty} &nbsp;|&nbsp;
                <span style="font-weight:bold;color:${c.is_free ? '#27ae60' : '#b71c1c'}">${c.is_free ? '🆓 Бесплатное' : '🔒 Платное'}</span>
                &nbsp;|&nbsp; 👥 ${s.started || 0} начали &nbsp; ✅ ${s.completed || 0} завершили
              </div>
            </div>
            <button class="btn btn-sm btn-outline" onclick="loadPreviewById(${c.case_number})">👁 Решение</button>
          </div>`;
        }).join('')}
      </div>`;
  } catch(e) {
    document.getElementById('casesList').innerHTML = `<p class="error">Ошибка: ${e.message}</p>`;
  }
}

// ===== РЕШЕНИЕ ДЕЛА =====
async function loadPreview() {
  const num = document.getElementById('previewNum').value;
  if (!num) return;
  await loadPreviewById(num);
}

async function loadPreviewById(num) {
  showTab('preview', document.querySelectorAll('.tab')[3]);
  document.getElementById('previewNum').value = num;
  document.getElementById('previewContainer').innerHTML = '<p class="empty">Загружаю...</p>';

  try {
    const res = await fetch(`${API}/api/cases/admin/${num}`, { headers: { 'x-admin-key': ADMIN_KEY } });
    if (!res.ok) {
      document.getElementById('previewContainer').innerHTML = '<p class="error">Дело не найдено</p>';
      return;
    }
    const data = await res.json();
    const p = data.puzzle_data;

    const placedSet = new Set();
    const secretSet = new Set((p.secret_cells||[]).map(([r,c])=>`${r},${c}`));
    for (const pl of (p.placements||[])) for (const [r,c] of pl.cells) placedSet.add(`${r},${c}`);

    let gridHtml = '<table class="grid">';
    for (let r = 0; r < 8; r++) {
      gridHtml += '<tr>';
      for (let c = 0; c < 8; c++) {
        const key = `${r},${c}`;
        const cls = secretSet.has(key) ? 'secret' : placedSet.has(key) ? 'found' : '';
        gridHtml += `<td class="${cls}">${p.grid[r][c]}</td>`;
      }
      gridHtml += '</tr>';
    }
    gridHtml += '</table>';

    const wordsHtml = (p.word_order||[]).map(w => {
      const isAbsent = w === p.absent_words?.killer || w === p.absent_words?.method;
      return `<span class="word-tag ${isAbsent ? 'absent' : 'in-grid'}">${w}</span>`;
    }).join('');

    document.getElementById('previewContainer').innerHTML = `
      <h3 style="font-size:18px;margin-bottom:16px">№${data.case_number} — ${data.title}</h3>
      <div class="legend">
        <span><span class="legend-dot" style="background:#c8e6c9;border:1px solid #27ae60"></span>Слова в сетке</span>
        <span><span class="legend-dot" style="background:#2c1a0e"></span>Секретные буквы места</span>
      </div>
      <div class="grid-wrap">${gridHtml}</div>
      <div class="words-list">${wordsHtml}</div>
      <div class="answer-box">
        <div class="answer-item"><span>🔪 Убийца</span>${p.absent_words?.killer}</div>
        <div class="answer-item"><span>⚗️ Метод</span>${p.absent_words?.method}</div>
        <div class="answer-item"><span>📍 Место</span>${p.location_answer}</div>
      </div>
    `;
  } catch(e) {
    document.getElementById('previewContainer').innerHTML = `<p class="error">Ошибка: ${e.message}</p>`;
  }
}

loadStats();
</script>
</body>
</html>
