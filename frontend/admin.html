<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Админка — Буквенное дело</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Georgia', serif; background: #1a1a2e; color: #e8e0d0; min-height: 100vh; padding: 20px; }
h1 { text-align: center; color: #c9a84c; margin-bottom: 30px; font-size: 24px; letter-spacing: 2px; }
h2 { color: #c9a84c; margin-bottom: 15px; font-size: 18px; }
.container { max-width: 1200px; margin: 0 auto; }
.card { background: #2c2c4a; border: 1px solid #c9a84c44; border-radius: 12px; padding: 24px; margin-bottom: 24px; }
.tabs { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
.tab { padding: 10px 22px; border-radius: 8px; cursor: pointer; border: 1px solid #c9a84c44; background: transparent; color: #c9a84c; font-family: inherit; font-size: 14px; transition: 0.2s; }
.tab.active { background: #c9a84c; color: #1a1a2e; font-weight: bold; }
.tab-content { display: none; }
.tab-content.active { display: block; }

/* Stats */
.stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px; }
.stat-box { background: #1a1a2e; border: 1px solid #c9a84c44; border-radius: 10px; padding: 18px; text-align: center; }
.stat-num { font-size: 32px; font-weight: bold; color: #c9a84c; }
.stat-label { font-size: 12px; color: #888; margin-top: 4px; }

/* Funnel */
.funnel { display: flex; flex-direction: column; gap: 8px; }
.funnel-row { display: flex; align-items: center; gap: 12px; }
.funnel-label { width: 160px; font-size: 13px; color: #888; text-align: right; flex-shrink: 0; }
.funnel-bar-wrap { flex: 1; background: #1a1a2e; border-radius: 4px; height: 28px; overflow: hidden; }
.funnel-bar { height: 100%; background: linear-gradient(90deg, #c9a84c, #e8c76a); border-radius: 4px; display: flex; align-items: center; padding-left: 10px; font-size: 13px; font-weight: bold; color: #1a1a2e; min-width: 40px; transition: width 0.5s; }

/* Table */
table.data { width: 100%; border-collapse: collapse; font-size: 13px; }
table.data th { color: #c9a84c; border-bottom: 1px solid #c9a84c44; padding: 8px 12px; text-align: left; }
table.data td { padding: 8px 12px; border-bottom: 1px solid #ffffff0a; }
table.data tr:hover td { background: #ffffff08; }

/* Cases */
.cases-list { display: flex; flex-direction: column; gap: 8px; }
.case-item { background: #1a1a2e; border: 1px solid #c9a84c33; border-radius: 8px; padding: 14px 18px; display: flex; justify-content: space-between; align-items: center; }
.case-title { font-weight: bold; color: #c9a84c; font-size: 15px; }
.case-meta { color: #888; font-size: 12px; margin-top: 3px; }
.btn { background: #c9a84c; color: #1a1a2e; border: none; border-radius: 8px; padding: 10px 20px; font-size: 14px; font-weight: bold; cursor: pointer; font-family: inherit; transition: 0.2s; }
.btn:hover { background: #e8c76a; }
.btn-sm { padding: 7px 14px; font-size: 13px; }
.btn-outline { background: transparent; border: 1px solid #c9a84c; color: #c9a84c; }
.btn-outline:hover { background: #c9a84c22; }

/* Grid */
.grid-wrap { overflow-x: auto; margin: 16px 0; }
table.grid { border-collapse: collapse; margin: 0 auto; }
table.grid td { width: 40px; height: 40px; text-align: center; vertical-align: middle; border: 1px solid #c9a84c22; font-size: 15px; font-weight: bold; border-radius: 3px; }
table.grid td.found { background: #4caf5055; color: #fff; border-color: #4caf5088; }
table.grid td.secret { background: #c9a84c44; color: #c9a84c; border-color: #c9a84c88; }
.words-list { display: flex; flex-wrap: wrap; gap: 8px; margin: 12px 0; }
.word-tag { padding: 6px 14px; border-radius: 20px; font-size: 14px; border: 1px solid #c9a84c55; background: #1a1a2e; }
.word-tag.in-grid { background: #4caf5022; border-color: #4caf50; color: #4caf50; }
.word-tag.absent { background: #c94c4c22; border-color: #c94c4c; color: #ff8a80; text-decoration: line-through; }
.answer-box { background: #1a1a2e; border: 1px solid #c9a84c55; border-radius: 8px; padding: 16px; margin-top: 12px; display: flex; gap: 24px; flex-wrap: wrap; }
.answer-box .answer-item { font-size: 15px; }
.answer-box .answer-item span { color: #c9a84c; font-weight: bold; display: block; font-size: 12px; margin-bottom: 2px; }
.legend { display: flex; gap: 16px; font-size: 12px; color: #888; margin-bottom: 8px; flex-wrap: wrap; }
.legend-dot { width: 14px; height: 14px; border-radius: 3px; display: inline-block; margin-right: 4px; vertical-align: middle; }
.row { display: flex; gap: 12px; align-items: flex-end; margin-bottom: 16px; flex-wrap: wrap; }
label { display: block; color: #c9a84c; font-size: 12px; margin-bottom: 5px; }
input, select { background: #1a1a2e; border: 1px solid #c9a84c55; color: #e8e0d0; border-radius: 8px; padding: 9px 13px; font-size: 14px; font-family: inherit; }
.badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: bold; }
.badge-free { background: #4caf5022; color: #4caf50; border: 1px solid #4caf5055; }
.badge-paid { background: #c94c4c22; color: #ff8a80; border: 1px solid #c94c4c55; }
.empty { color: #888; text-align: center; padding: 24px; }
</style>
</head>
<body>
<div class="container">
  <h1>🔍 БУКВЕННОЕ ДЕЛО — АДМИНКА</h1>

  <div class="tabs">
    <button class="tab active" onclick="showTab('stats', this)">📊 Статистика</button>
    <button class="tab" onclick="showTab('cases', this)">📋 Дела</button>
    <button class="tab" onclick="showTab('preview', this)">👁 Решение дела</button>
  </div>

  <!-- СТАТИСТИКА -->
  <div id="tab-stats" class="tab-content active">
    <div id="statsContent"><p class="empty">Загружаю...</p></div>
  </div>

  <!-- ДЕЛА -->
  <div id="tab-cases" class="tab-content">
    <div class="card">
      <h2>📋 Все дела</h2>
      <button class="btn btn-sm" onclick="loadCases()" style="margin-bottom:16px">🔄 Обновить</button>
      <div id="casesList"><p class="empty">Нажми "Обновить"</p></div>
    </div>
  </div>

  <!-- РЕШЕНИЕ ДЕЛА -->
  <div id="tab-preview" class="tab-content">
    <div class="card">
      <h2>👁 Просмотр решения</h2>
      <div class="row">
        <div>
          <label>Номер дела</label>
          <input type="number" id="previewNum" placeholder="1" style="width:100px" onkeydown="if(event.key==='Enter')loadPreview()">
        </div>
        <button class="btn btn-sm" onclick="loadPreview()">Загрузить</button>
      </div>
      <div id="previewContainer"><p class="empty">Введи номер дела и нажми "Загрузить"</p></div>
    </div>
  </div>
</div>

<script>
const API = 'https://inspiring-friendship-production-bf42.up.railway.app';
const ADMIN_KEY = 'bukvendelo_admin_2024';

function showTab(name, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  el.classList.add('active');
  if (name === 'stats') loadStats();
  if (name === 'cases') loadCases();
}

// ===== СТАТИСТИКА =====
async function loadStats() {
  document.getElementById('statsContent').innerHTML = '<p class="empty">Загружаю...</p>';
  try {
    const res = await fetch(`${API}/api/analytics/dashboard`, { headers: { 'x-admin-key': ADMIN_KEY } });
    const d = await res.json();
    const t = d.totals;
    const f = d.funnel;
    const maxFunnel = Math.max(f.bot_start, 1);

    const funnelItems = [
      { label: '🤖 Запуск бота', val: f.bot_start },
      { label: '📱 Открыли игру', val: f.app_open },
      { label: '🎮 Начали дело', val: f.game_start },
      { label: '✅ Завершили', val: f.game_complete },
      { label: '💳 Видели paywall', val: f.paywall_shown },
      { label: '🔓 Подписались', val: f.subscribed },
    ];

    document.getElementById('statsContent').innerHTML = `
      <div class="stats-grid">
        <div class="stat-box"><div class="stat-num">${t.total_users}</div><div class="stat-label">Всего пользователей</div></div>
        <div class="stat-box"><div class="stat-num">${t.new_users_7d}</div><div class="stat-label">Новых за 7 дней</div></div>
        <div class="stat-box"><div class="stat-num">${t.new_users_30d}</div><div class="stat-label">Новых за 30 дней</div></div>
        <div class="stat-box"><div class="stat-num">${t.dau}</div><div class="stat-label">DAU (сегодня)</div></div>
        <div class="stat-box"><div class="stat-num">${t.wau}</div><div class="stat-label">WAU (неделя)</div></div>
        <div class="stat-box"><div class="stat-num">${t.total_completions}</div><div class="stat-label">Дел завершено</div></div>
        <div class="stat-box"><div class="stat-num">${t.monthly_subs}</div><div class="stat-label">Подписок (месяц)</div></div>
        <div class="stat-box"><div class="stat-num">${t.lifetime_subs}</div><div class="stat-label">Подписок (навсегда)</div></div>
      </div>

      <div class="card">
        <h2>🔽 Воронка</h2>
        <div class="funnel">
          ${funnelItems.map(item => `
            <div class="funnel-row">
              <div class="funnel-label">${item.label}</div>
              <div class="funnel-bar-wrap">
                <div class="funnel-bar" style="width:${Math.max(3, Math.round(item.val/maxFunnel*100))}%">${item.val}</div>
              </div>
            </div>
          `).join('')}
        </div>
      </div>

      <div class="card">
        <h2>🏆 Топ дел</h2>
        <table class="data">
          <thead><tr><th>№</th><th>Название</th><th>Начали</th><th>Завершили</th><th>Среднее время</th></tr></thead>
          <tbody>
            ${d.topCases.map(c => `
              <tr>
                <td>${c.case_number}</td>
                <td>${c.title}</td>
                <td>${c.started}</td>
                <td>${c.completed}</td>
                <td>${c.avg_minutes ? c.avg_minutes + ' мин' : '—'}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>

      <div class="card">
        <h2>📅 События за 30 дней</h2>
        <table class="data">
          <thead><tr><th>Дата</th><th>Событие</th><th>Всего</th><th>Уникальных</th></tr></thead>
          <tbody>
            ${d.byDay.slice(0, 50).map(r => `
              <tr>
                <td>${r.date}</td>
                <td>${r.event}</td>
                <td>${r.count}</td>
                <td>${r.unique_users}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    `;
  } catch(e) {
    document.getElementById('statsContent').innerHTML = `<p class="empty" style="color:#ff8a80">Ошибка: ${e.message}</p>`;
  }
}

// ===== ДЕЛА =====
async function loadCases() {
  document.getElementById('casesList').innerHTML = '<p class="empty">Загружаю...</p>';
  try {
    const res = await fetch(`${API}/api/analytics/dashboard`, { headers: { 'x-admin-key': ADMIN_KEY } });
    const d = await res.json();
    const statsMap = {};
    for (const c of d.topCases) statsMap[c.case_number] = c;

    const res2 = await fetch(`${API}/api/cases/admin/list`, { headers: { 'x-admin-key': ADMIN_KEY } });

    if (!res2.ok) {
      document.getElementById('casesList').innerHTML = `
        <p class="empty" style="color:#ff8a80">
          Нет доступа к списку дел. Убедись что роут /api/cases/admin/list существует.
        </p>`;
      return;
    }

    const cases = await res2.json();
    if (!cases.length) { document.getElementById('casesList').innerHTML = '<p class="empty">Дел нет</p>'; return; }

    document.getElementById('casesList').innerHTML = `
      <div class="cases-list">
        ${cases.map(c => {
          const s = statsMap[c.case_number] || {};
          return `
          <div class="case-item">
            <div>
              <div class="case-title">№${c.case_number} — ${c.title}</div>
              <div class="case-meta">
                ${c.difficulty} &nbsp;|&nbsp;
                <span class="badge ${c.is_free ? 'badge-free' : 'badge-paid'}">${c.is_free ? 'Бесплатное' : 'Платное'}</span>
                &nbsp;|&nbsp; 👥 ${s.started || 0} начали &nbsp; ✅ ${s.completed || 0} завершили
              </div>
            </div>
            <button class="btn btn-sm btn-outline" onclick="loadPreviewById(${c.case_number})">👁 Решение</button>
          </div>`;
        }).join('')}
      </div>`;
  } catch(e) {
    document.getElementById('casesList').innerHTML = `<p class="empty" style="color:#ff8a80">Ошибка: ${e.message}</p>`;
  }
}

// ===== РЕШЕНИЕ ДЕЛА =====
async function loadPreview() {
  const num = document.getElementById('previewNum').value;
  if (!num) return;
  await loadPreviewById(num);
}

async function loadPreviewById(num) {
  showTab('preview', document.querySelectorAll('.tab')[2]);
  document.getElementById('previewNum').value = num;
  document.getElementById('previewContainer').innerHTML = '<p class="empty">Загружаю...</p>';

  try {
    const res = await fetch(`${API}/api/cases/admin/${num}`, { headers: { 'x-admin-key': ADMIN_KEY } });
    if (!res.ok) {
      document.getElementById('previewContainer').innerHTML = '<p class="empty" style="color:#ff8a80">Дело не найдено</p>';
      return;
    }
    const data = await res.json();
    const p = data.puzzle_data;

    const SIZE = 10;
    const placedSet = new Set();
    const secretSet = new Set((p.secret_cells||[]).map(([r,c])=>`${r},${c}`));
    for (const pl of (p.placements||[])) for (const [r,c] of pl.cells) placedSet.add(`${r},${c}`);

    let gridHtml = '<table class="grid">';
    for (let r = 0; r < 8; r++) {
      gridHtml += '<tr>';
      for (let c = 0; c < 8; c++) {
        const key = `${r},${c}`;
        const cls = placedSet.has(key) ? 'found' : secretSet.has(key) ? 'secret' : '';
        gridHtml += `<td class="${cls}">${p.grid[r][c]}</td>`;
      }
      gridHtml += '</tr>';
    }
    gridHtml += '</table>';

    const wordsHtml = (p.word_order||[]).map(w => {
      const isAbsent = w === p.absent_words?.killer || w === p.absent_words?.method;
      return `<span class="word-tag ${isAbsent ? 'absent' : 'in-grid'}">${w}</span>`;
    }).join('');

    document.getElementById('previewContainer').innerHTML = `
      <h3 style="color:#c9a84c;margin-bottom:16px">№${data.case_number} — ${data.title}</h3>
      <div class="legend">
        <span><span class="legend-dot" style="background:#4caf5055;border:1px solid #4caf50"></span>Слова в сетке</span>
        <span><span class="legend-dot" style="background:#c9a84c44;border:1px solid #c9a84c"></span>Секретные буквы места</span>
        <span><span class="legend-dot" style="background:#1a1a2e;border:1px solid #444"></span>Случайные буквы</span>
      </div>
      <div class="grid-wrap">${gridHtml}</div>
      <div class="words-list">${wordsHtml}</div>
      <div class="answer-box">
        <div class="answer-item"><span>🔪 Убийца</span>${p.absent_words?.killer}</div>
        <div class="answer-item"><span>⚗️ Метод</span>${p.absent_words?.method}</div>
        <div class="answer-item"><span>📍 Место преступления</span>${p.location_answer}</div>
      </div>
    `;
  } catch(e) {
    document.getElementById('previewContainer').innerHTML = `<p class="empty" style="color:#ff8a80">Ошибка: ${e.message}</p>`;
  }
}

// Загружаем статистику сразу
loadStats();
</script>
</body>
</html>
